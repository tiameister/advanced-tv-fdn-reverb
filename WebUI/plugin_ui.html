<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TiaVerb</title>
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/Inter-400.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url('fonts/Inter-500.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url('fonts/Inter-600.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/Inter-700.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:800;font-display:swap;src:url('fonts/Inter-800.woff2') format('woff2')}
:root{
  --bg:#080b12;--surface:rgba(255,255,255,.032);--surface2:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.12);
  --text:#e0e0e0;--muted:#6a7a90;--accent:#4a90e2;--accent-dim:rgba(74,144,226,.18);
  --dropdown-bg:#1e1e24;--purple:#9b7af8;--r:14px;--r-sm:9px;--t:.15s ease;
  --font:'Inter','Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;user-select:none}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,158,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(79,158,255,.015) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;min-height:0;padding:8px 10px;gap:8px}
.header{display:flex;align-items:center;padding:0 14px;height:48px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);position:relative;z-index:200}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-svg{width:26px;height:26px}
.logo-name{font-size:14px;font-weight:800;letter-spacing:.12em;background:linear-gradient(120deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.14em}
.header-mid{flex:1;display:flex;justify-content:center}
.preset-wrap{position:relative;z-index:210}
.preset-trigger{display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:168px;padding:6px 12px;background:var(--dropdown-bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer}
.preset-trigger:hover{border-color:var(--border2)}
.preset-menu{position:fixed;margin:0;padding:4px 0;list-style:none;background:var(--dropdown-bg);border:1px solid var(--border2);border-radius:var(--r-sm);box-shadow:0 12px 32px rgba(0,0,0,.65);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-4px);transition:opacity .15s ease;z-index:10000;max-height:220px;overflow-y:auto}
.preset-menu.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0)}
.preset-item{padding:8px 14px;font-size:12px;cursor:pointer}
.preset-item:hover{background:var(--accent);color:#fff}
.preset-item.placeholder{color:var(--muted);pointer-events:none}
.version{font-size:9px;color:var(--muted);letter-spacing:.09em}
.panel{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px 12px}
.panel::before{content:'';position:absolute;left:0;top:12%;bottom:12%;width:3px;border-radius:0 2px 2px 0;background:linear-gradient(180deg,var(--accent),var(--purple))}
.viz-wrap{position:relative;width:100%;max-width:600px;flex:1;min-height:108px;max-height:148px;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.04);border-radius:var(--r-sm);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.03),inset 0 -8px 24px rgba(0,0,0,.25)}
.viz-wrap svg{display:block;width:100%;height:100%}
.viz-label{position:absolute;font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(106,122,144,.85);pointer-events:none}
.viz-label-freq{top:7px;left:12px}
.viz-label-time{bottom:6px;left:12px}
.viz-freq-tag{position:absolute;top:7px;right:12px;font-size:9px;font-weight:500;color:var(--accent);font-variant-numeric:tabular-nums;pointer-events:none}
.knob-row{display:grid;grid-template-columns:repeat(5,1fr);align-items:center;justify-items:center;gap:4px;width:100%;max-width:600px;flex-shrink:0}
.knob{display:flex;flex-direction:column;align-items:center;gap:6px;width:76px;padding:0;border-radius:0;cursor:ns-resize;background:transparent}
.knob:hover,.knob.dragging{background:transparent}
.knob-svg-wrap{width:72px;height:72px;display:flex;align-items:center;justify-content:center}
.knob svg{width:72px;height:72px;display:block;overflow:visible}
.k-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:3.5;stroke-linecap:round}
.k-arc{fill:none;stroke-width:3.5;stroke-linecap:round}
.k-cap{fill:#13161e;filter:drop-shadow(0 2px 5px rgba(0,0,0,.35))}
.k-ind{stroke:rgba(255,255,255,.92);stroke-width:1.5;stroke-linecap:round}
.k-name{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:center;line-height:1.2}
.k-val{font-size:12px;font-weight:600;color:#e0e0e0;font-variant-numeric:tabular-nums;min-width:56px;text-align:center;line-height:1.2;font-family:var(--font)}
.k-val .unit{font-size:9px;font-weight:400;color:#888;margin-left:1px;letter-spacing:.02em}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <svg class="logo-svg" viewBox="0 0 26 26" fill="none">
        <defs><linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#9b7af8"/></linearGradient></defs>
        <polygon points="13,1 25,9 21,23 5,23 1,9" fill="rgba(74,144,226,.12)" stroke="url(#gemGrad)" stroke-width="1.2"/>
        <circle cx="13" cy="13" r="3" fill="url(#gemGrad)" opacity=".8"/>
      </svg>
      <div>
        <div class="logo-name">TiaVerb</div>
        <div class="logo-sub">DATTORRO REVERB</div>
      </div>
    </div>
    <div class="header-mid">
      <div class="preset-wrap" id="presetWrap">
        <button class="preset-trigger" id="presetTrigger" type="button">
          <span id="presetLabel">- Presets -</span>
          <svg width="9" height="6" viewBox="0 0 9 6"><path fill="currentColor" d="M0 0l4.5 6L9 0z"/></svg>
        </button>
        <ul class="preset-menu" id="presetMenu">
          <li class="preset-item placeholder">- Presets -</li>
          <li class="preset-item" data-name="Small Room">Small Room</li>
          <li class="preset-item" data-name="Lush Plate">Lush Plate</li>
          <li class="preset-item" data-name="Large Hall">Large Hall</li>
          <li class="preset-item" data-name="Cathedral">Cathedral</li>
        </ul>
      </div>
    </div>
    <span class="version">v2.0.0</span>
  </header>
  <div class="panel">
    <div class="viz-wrap" id="vizWrap">
      <span class="viz-label viz-label-freq">High-cut</span>
      <span class="viz-label viz-label-time">Decay</span>
      <span class="viz-freq-tag" id="vizFreqTag">8.0 kHz</span>
      <svg id="vizSvg" viewBox="0 0 600 130" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="vizDampFill" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(74,144,226,.22)"/>
            <stop offset="100%" stop-color="rgba(155,122,248,.08)"/>
          </linearGradient>
          <linearGradient id="vizTailFill" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(74,144,226,.42)"/>
            <stop offset="55%" stop-color="rgba(74,144,226,.14)"/>
            <stop offset="100%" stop-color="rgba(155,122,248,0)"/>
          </linearGradient>
        </defs>
        <g opacity=".35" stroke="rgba(255,255,255,.06)" stroke-width="1">
          <line x1="48" y1="18" x2="588" y2="18"/><line x1="48" y1="38" x2="588" y2="38"/><line x1="48" y1="58" x2="588" y2="58"/>
          <line x1="120" y1="72" x2="120" y2="118"/><line x1="300" y1="72" x2="300" y2="118"/><line x1="480" y1="72" x2="480" y2="118"/>
        </g>
        <path id="vizDampArea" fill="url(#vizDampFill)" d=""/>
        <path id="vizDampLine" fill="none" stroke="url(#gDampStroke)" stroke-width="1.8" d=""/>
        <line id="vizDampCutoff" stroke="rgba(74,144,226,.35)" stroke-width="1" stroke-dasharray="3 3" y1="12" y2="64"/>
        <path id="vizTailArea" fill="url(#vizTailFill)" d=""/>
        <path id="vizTailLine" fill="none" stroke="rgba(74,144,226,.75)" stroke-width="1.6" d=""/>
        <line id="vizPredelayMark" stroke="rgba(155,122,248,.55)" stroke-width="1.2" y1="68" y2="122"/>
        <defs>
          <linearGradient id="gDampStroke" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#9b7af8"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="knob-row" id="rowMain"></div>
  </div>
</div>
<script>
let userDragging = false;

/** Send JSON to C++ via WebView2 postMessage (JUCE native integration envelope). */
function sendToHost(eventId, payload) {
  const envelope = { eventId, payload };
  if (window.__JUCE__?.backend) {
    window.__JUCE__.backend.emitEvent(eventId, payload);
    return;
  }
  if (window.chrome?.webview?.postMessage) {
    window.chrome.webview.postMessage(JSON.stringify(envelope));
    return;
  }
  // Legacy iframe fallback (non-WebView2)
  if (eventId === 'setParameter') {
    bridge.send('setParam', { id: payload.paramId, value: payload.value });
  } else if (eventId === 'loadPreset') {
    bridge.send('loadPreset', payload);
  }
}

function sendParameter(paramId, value) {
  sendToHost('setParameter', { paramId, value });
}

const bridge = {
  _cb: {},
  send(action, params) {
    const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    this._frame().src = `juce://${action}?${qs}`;
  },
  on(id, fn) { (this._cb[id] ||= []).push(fn); },
  _frame() {
    let f = document.getElementById('__jBridge');
    if (!f) {
      f = document.createElement('iframe');
      f.id = '__jBridge';
      Object.assign(f.style, { display: 'none', width: '0', height: '0', border: '0' });
      document.body.appendChild(f);
    }
    return f;
  }
};

/** Apply a single parameter update from C++ without echoing back to the host. */
function applyHostParameter(paramId, value) {
  if (userDragging) return;
  const id = String(paramId);
  const v = parseFloat(value);
  if (state[id] === undefined) return;
  state[id] = v;
  (bridge._cb[id] || []).forEach(fn => fn(v));
  updateVisualizer();
}

function bindHostParameterListener() {
  const onUpdate = (payload) => applyHostParameter(payload.paramId, payload.value);
  if (window.__JUCE__?.backend) {
    window.__JUCE__.backend.addEventListener('parameterUpdate', onUpdate);
  }
}

// Legacy evaluateJavascript fallbacks (still supported)
window._juceUpdate = (id, val) => applyHostParameter(id, val);

window._juceBatchUpdate = (data) => {
  let obj;
  try { obj = typeof data === 'string' ? JSON.parse(data) : data; } catch (e) { return; }
  userDragging = false;
  Object.entries(obj).forEach(([id, val]) => applyHostParameter(id, val));
  updateVisualizer();
};

const SCHEMA = {
  time:     { label: 'TIME',     min: 0.1,   max: 20,    def: 2.5,  dec: 2, unit: 's',  color: ['#4a90e2', '#9b7af8'] },
  size:     { label: 'SIZE',     min: 0,     max: 1,     def: 0.33, dec: 2, unit: '',   color: ['#4a90e2', '#9b7af8'] },
  damping:  { label: 'DAMPING',  min: 500,   max: 20000, def: 8000, dec: 0, unit: 'Hz', color: ['#4a90e2', '#9b7af8'] },
  preDelay: { label: 'PRE-DLY',  min: 0,     max: 200,   def: 0,    dec: 0, unit: 'ms', color: ['#4a90e2', '#9b7af8'] },
  mix:      { label: 'MIX',      min: 0,     max: 1,     def: 0.35, dec: 0, fmt: v => Math.round(v * 100) + '%', color: ['#4a90e2', '#9b7af8'] },
};

const state = {};
Object.entries(SCHEMA).forEach(([id, p]) => { state[id] = p.def; });

const fmt = (id, v) => {
  const p = SCHEMA[id];
  return p.fmt ? p.fmt(v) : v.toFixed(p.dec) + (p.unit || '');
};

/** Value HTML with dimmed unit span (e.g. 2.50<span class="unit">s</span>). */
const fmtHtml = (id, v) => {
  const p = SCHEMA[id];
  if (p.fmt) {
    const s = p.fmt(v);
    const m = s.match(/^([\d.]+)(.*)$/);
    if (m && m[2]) return `${m[1]}<span class="unit">${m[2]}</span>`;
    return s;
  }
  const num = v.toFixed(p.dec);
  if (p.unit) return `${num}<span class="unit">${p.unit}</span>`;
  return num;
};
const norm = (id, v) => {
  const p = SCHEMA[id];
  return Math.max(0, Math.min(1, (v - p.min) / (p.max - p.min)));
};
const denorm = (id, n) => {
  const p = SCHEMA[id];
  return p.min + n * (p.max - p.min);
};

// ── FabFilter-style response visualizer ───────────────────────────────────────
const VIZ = {
  dampArea: null, dampLine: null, dampCutoff: null,
  tailArea: null, tailLine: null, predelayMark: null, freqTag: null,
};
const VIZ_FREQ_MIN = 80;
const VIZ_FREQ_MAX = 20000;
const VIZ_PAD = { l: 48, r: 12, freqTop: 14, freqH: 48, timeTop: 72, timeBot: 122 };
const VIZ_GW = 600 - VIZ_PAD.l - VIZ_PAD.r;

function vizLogFreqX(freq) {
  const t = (Math.log(freq) - Math.log(VIZ_FREQ_MIN)) / (Math.log(VIZ_FREQ_MAX) - Math.log(VIZ_FREQ_MIN));
  return VIZ_PAD.l + Math.max(0, Math.min(1, t)) * VIZ_GW;
}

function lpMag(f, fc) {
  const r = f / Math.max(fc, 1);
  return 1 / Math.sqrt(1 + r * r);
}

function formatFreqTag(hz) {
  if (hz >= 10000) return (hz / 1000).toFixed(1).replace(/\.0$/, '') + ' kHz';
  if (hz >= 1000) return (hz / 1000).toFixed(1) + ' kHz';
  return Math.round(hz) + ' Hz';
}

function drawDampingCurve(fc) {
  const top = VIZ_PAD.freqTop;
  const h = VIZ_PAD.freqH;
  const baseY = top + h;
  let line = '';
  let area = `M ${VIZ_PAD.l} ${baseY}`;
  const steps = 96;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const f = VIZ_FREQ_MIN * Math.pow(VIZ_FREQ_MAX / VIZ_FREQ_MIN, t);
    const x = vizLogFreqX(f);
    const mag = lpMag(f, fc);
    const y = top + (1 - mag) * h * 0.92 + 2;
    line += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(1)} ${y.toFixed(1)} `;
    area += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  area += `L ${VIZ_PAD.l + VIZ_GW} ${baseY} Z`;
  VIZ.dampLine.setAttribute('d', line.trim());
  VIZ.dampArea.setAttribute('d', area);
  const cutX = vizLogFreqX(Math.min(fc, VIZ_FREQ_MAX));
  VIZ.dampCutoff.setAttribute('x1', cutX.toFixed(1));
  VIZ.dampCutoff.setAttribute('x2', cutX.toFixed(1));
  VIZ.freqTag.textContent = formatFreqTag(fc);
}

function drawTailEnvelope(timeSec, preDlyMs, size01) {
  const yBase = VIZ_PAD.timeBot;
  const yTop = VIZ_PAD.timeTop;
  const h = yBase - yTop;
  const startX = VIZ_PAD.l + (preDlyMs / 200) * VIZ_GW * 0.24;
  const tau = 0.18 + timeSec * 0.42 + size01 * 0.35;
  const peak = 0.42 + size01 * 0.38;
  const endX = VIZ_PAD.l + VIZ_GW;
  const steps = 72;
  let line = '';
  let area = `M ${startX.toFixed(1)} ${yBase}`;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = startX + t * (endX - startX);
    const sec = t * tau * 3.2;
    let amp = peak * Math.exp(-sec / tau);
    if (t < 0.06) amp *= t / 0.06;
    const erBump = 0.12 * size01 * Math.exp(-Math.pow((t - 0.04) / 0.035, 2));
    amp = Math.min(1, amp + erBump);
    const y = yBase - amp * h * 0.88;
    line += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(1)} ${y.toFixed(1)} `;
    area += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  area += `L ${endX.toFixed(1)} ${yBase} Z`;
  VIZ.tailLine.setAttribute('d', line.trim());
  VIZ.tailArea.setAttribute('d', area);
  VIZ.predelayMark.setAttribute('x1', startX.toFixed(1));
  VIZ.predelayMark.setAttribute('x2', startX.toFixed(1));
}

function updateVisualizer() {
  if (!VIZ.dampLine) return;
  drawDampingCurve(state.damping);
  drawTailEnvelope(state.time, state.preDelay, state.size);
}

function initVisualizer() {
  VIZ.dampArea = document.getElementById('vizDampArea');
  VIZ.dampLine = document.getElementById('vizDampLine');
  VIZ.dampCutoff = document.getElementById('vizDampCutoff');
  VIZ.tailArea = document.getElementById('vizTailArea');
  VIZ.tailLine = document.getElementById('vizTailLine');
  VIZ.predelayMark = document.getElementById('vizPredelayMark');
  VIZ.freqTag = document.getElementById('vizFreqTag');
  updateVisualizer();
}

const R = 36, CX = 36, CY = 36, KR = 27, ANG0 = -135, SWEEP = 270;

function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}
function arc(cx, cy, r, a1, a2) {
  if (Math.abs(a2 - a1) < 0.01) return '';
  const [sx, sy] = polar(cx, cy, r, a1);
  const [ex, ey] = polar(cx, cy, r, a2);
  const lg = Math.abs(a2 - a1) > 180 ? 1 : 0;
  return `M${sx.toFixed(2)},${sy.toFixed(2)} A${r},${r} 0 ${lg},1 ${ex.toFixed(2)},${ey.toFixed(2)}`;
}

function buildKnob(id, parent) {
  const p = SCHEMA[id];
  const wrap = document.createElement('div');
  wrap.className = 'knob';
  wrap.innerHTML = `
    <div class="knob-svg-wrap">
      <svg viewBox="0 0 72 72">
        <path class="k-track" stroke-linecap="round" d="${arc(CX, CY, KR, ANG0, ANG0 + SWEEP)}"/>
        <path class="k-arc" stroke-linecap="round" stroke="url(#g${id})" d=""/>
        <circle class="k-cap" cx="${CX}" cy="${CY}" r="18"/>
        <line class="k-ind" stroke-linecap="round" x1="${CX}" y1="${CY}" x2="${CX}" y2="${CY - KR + 6}"/>
      </svg>
    </div>
    <div class="k-name">${p.label}</div>
    <div class="k-val"></div>`;
  const svg = wrap.querySelector('svg');
  const grad = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  grad.innerHTML = `<linearGradient id="g${id}" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${p.color[0]}"/><stop offset="100%" stop-color="${p.color[1]}"/></linearGradient>`;
  svg.insertBefore(grad, svg.firstChild);
  const arcEl = wrap.querySelector('.k-arc');
  const ind = wrap.querySelector('.k-ind');
  const valEl = wrap.querySelector('.k-val');

  const redraw = (v) => {
    const n = norm(id, v);
    const ang = ANG0 + n * SWEEP;
    arcEl.setAttribute('d', arc(CX, CY, KR, ANG0, ang));
    const [ix, iy] = polar(CX, CY, KR - 6, ang);
    ind.setAttribute('x2', ix.toFixed(2));
    ind.setAttribute('y2', iy.toFixed(2));
    valEl.innerHTML = fmtHtml(id, v);
  };

  redraw(state[id]);
  bridge.on(id, redraw);
  parent.appendChild(wrap);

  let startY = 0, startV = 0;
  const down = (e) => {
    e.preventDefault();
    userDragging = true;
    wrap.classList.add('dragging');
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    startV = state[id];
    const move = (ev) => {
      const y = (ev.touches ? ev.touches[0].clientY : ev.clientY);
      const delta = (startY - y) * 0.005 * (SCHEMA[id].max - SCHEMA[id].min);
      state[id] = Math.max(SCHEMA[id].min, Math.min(SCHEMA[id].max, startV + delta));
      redraw(state[id]);
      sendParameter(id, state[id]);
      updateVisualizer();
    };
    const up = () => {
      wrap.classList.remove('dragging');
      userDragging = false;
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', up);
  };
  wrap.addEventListener('mousedown', down);
  wrap.addEventListener('touchstart', down, { passive: false });
  wrap.addEventListener('dblclick', () => {
    state[id] = SCHEMA[id].def;
    redraw(state[id]);
    sendParameter(id, state[id]);
    updateVisualizer();
  });
  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const step = (SCHEMA[id].max - SCHEMA[id].min) * 0.02 * (e.deltaY < 0 ? 1 : -1);
    state[id] = Math.max(SCHEMA[id].min, Math.min(SCHEMA[id].max, state[id] + step));
    redraw(state[id]);
    sendParameter(id, state[id]);
    updateVisualizer();
  }, { passive: false });
}

function initPresetDropdown() {
  const wrap = document.getElementById('presetWrap');
  const trigger = document.getElementById('presetTrigger');
  const menu = document.getElementById('presetMenu');

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const open = menu.classList.toggle('open');
    if (open) {
      const r = trigger.getBoundingClientRect();
      menu.style.top = (r.bottom + 4) + 'px';
      menu.style.left = r.left + 'px';
      menu.style.minWidth = r.width + 'px';
    }
  });

  menu.querySelectorAll('.preset-item[data-name]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const name = item.dataset.name;
      document.getElementById('presetLabel').textContent = name;
      sendToHost('loadPreset', { name });
      menu.classList.remove('open');
    });
  });

  document.addEventListener('click', () => menu.classList.remove('open'));
}

function init() {
  bindHostParameterListener();
  initPresetDropdown();
  initVisualizer();
  Object.keys(SCHEMA).forEach(id => buildKnob(id, document.getElementById('rowMain')));
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
